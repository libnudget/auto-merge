---
name: Auto Merge
description: Enable or disable PR auto-merge

inputs:
  mode:
    description: 'Mode: enable, disable, now'
    required: true
    default: enable
  repo:
    description: Repository (owner/name)
    required: false
    default: ${{ github.repository }}
  branch:
    description: Branch to merge into
    required: false
    default: main
  token:
    description: GitHub token
    required: true

runs:
  using: composite
  steps:
    - name: Get PR number
      id: pr
      shell: bash
      run: |
        echo "pr_num=${PR_URL##*/}" >> $GITHUB_OUTPUT
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}

    - name: Enable auto-merge
      if: inputs.mode == 'enable'
      shell: bash
      run: gh pr merge --auto --squash "$PR_NUM" -R "$REPO" -b "$BRANCH"
      env:
        PR_NUM: ${{ steps.pr.outputs.pr_num }}
        REPO: ${{ inputs.repo }}
        BRANCH: ${{ inputs.branch }}
        GH_TOKEN: ${{ inputs.token }}

    - name: Disable auto-merge
      if: inputs.mode == 'disable'
      shell: bash
      run: gh pr merge --disable-auto "$PR_NUM" -R "$REPO"
      env:
        PR_NUM: ${{ steps.pr.outputs.pr_num }}
        REPO: ${{ inputs.repo }}
        GH_TOKEN: ${{ inputs.token }}

    - name: Merge now (skip checks)
      if: inputs.mode == 'now'
      shell: bash
      run: gh pr merge --squash --admin "$PR_NUM" -R "$REPO" -b "$BRANCH"
      env:
        PR_NUM: ${{ steps.pr.outputs.pr_num }}
        REPO: ${{ inputs.repo }}
        BRANCH: ${{ inputs.branch }}
        GH_TOKEN: ${{ inputs.token }}