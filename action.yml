---
name: Auto Merge
description: Enable or disable PR auto-merge

inputs:
  mode:
    description: 'Mode: enable, disable, now'
    required: true
    default: enable
  repo:
    description: Repository (owner/name)
    required: false
    default: ${{ github.repository }}
  branch:
    description: Branch to merge into
    required: false
    default: main
  token:
    description: GitHub token
    required: true

runs:
  using: composite
  steps:
    - name: Get PR number
      id: pr
      shell: bash
      run: |
        echo "pr_num=${PR_URL##*/}" >> $GITHUB_OUTPUT
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}

    - name: Enable auto-merge
      if: inputs.mode == 'enable'
      shell: bash
      run: gh pr merge --auto --squash "$PR_NUM" -R "$REPO" -b "$BRANCH"
      env:
        PR_NUM: ${{ steps.pr.outputs.pr_num }}
        REPO: ${{ inputs.repo }}
        BRANCH: ${{ inputs.branch }}
        GH_TOKEN: ${{ inputs.token }}

    - name: Disable auto-merge
      if: inputs.mode == 'disable'
      shell: bash
      run: gh pr merge --disable-auto "$PR_NUM" -R "$REPO"
      env:
        PR_NUM: ${{ steps.pr.outputs.pr_num }}
        REPO: ${{ inputs.repo }}
        GH_TOKEN: ${{ inputs.token }}

    - name: Merge now (skip checks)
      if: inputs.mode == 'now'
      shell: bash
      run: |
        echo "Attempting immediate merge..."
        echo "PR: $PR_NUM, Repo: $REPO, Branch: $BRANCH"
        
        for i in {1..30}; do
          STATUS=$(gh pr view "$PR_NUM" -R "$REPO" --json mergeable -q '.mergeable')
          if [ "$STATUS" = "MERGEABLE" ]; then
            echo "PR is mergeable, attempting merge..."
            gh pr merge --squash --admin "$PR_NUM" -R "$REPO" -b "$BRANCH" && exit 0
          fi
          echo "PR not mergeable yet (attempt $i/30). Checking again in 10s..."
          sleep 10
        done
        
        echo "PR not mergeable after 5 minutes. Current status:"
        gh pr view "$PR_NUM" -R "$REPO" --json state,mergeable,mergeStateStatus,reviewDecision,statusCheckRollup
        exit 1
      env:
        PR_NUM: ${{ steps.pr.outputs.pr_num }}
        REPO: ${{ inputs.repo }}
        BRANCH: ${{ inputs.branch }}
        GH_TOKEN: ${{ inputs.token }}